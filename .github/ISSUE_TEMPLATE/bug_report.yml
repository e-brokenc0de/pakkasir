name: Bug report
description: Something in the SDK is broken or misbehaving.
title: '[bug]: '
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
        Before submitting, please search existing issues to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: pakkasir version
      description: Output of `pnpm list pakkasir` (or the version from your `package.json`).
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime
      description: Node.js / browser / edge runtime and version.
      placeholder: e.g. Node.js 20.11.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Please paste a minimal code snippet that reproduces the issue. Remove any credentials.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / error output
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true
